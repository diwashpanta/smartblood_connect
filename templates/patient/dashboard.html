{% extends 'base.html' %}{% block content %}
<div class='d-flex justify-content-between align-items-center mb-3'><h3>Patient Dashboard</h3><a href='/app/patient/requests/new/' class='btn btn-danger'>New Request</a></div>
<div class='card shadow-sm'><div class='card-body'><table class='table table-hover'><tr><th>ID</th><th>Blood</th><th>Units</th><th>Status</th></tr>{% for r in requests %}<tr><td>{{r.id}}</td><td>{{r.blood_group}}</td><td>{{r.units_needed}}</td><td><span class='badge bg-secondary'>{{r.status}}</span></td></tr>{% empty %}<tr><td colspan='4'>No requests yet.</td></tr>{% endfor %}</table></div></div>
{% endblock %}
