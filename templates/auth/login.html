{% extends 'base.html' %}
{% block content %}
<body class='auth-body'>
  <div class='auth-split'>
    <div class='auth-hero'><div class='hero-inner'><h1 class='hero-title'>SmartBlood<br/><em>Connect</em></h1><p class='hero-sub'>Sign in as patient, donor, or admin.</p></div></div>
    <div class='auth-form-panel'>
      <div class='form-section active'>
        <h2 class='form-title'>Welcome back</h2>
        <form method='post'>
          {% csrf_token %}
          <div class='field-group'><label>Username</label><input name='username' required></div>
          <div class='field-group'><label>Password</label><input type='password' name='password' required></div>
          <button type='submit' class='btn-primary full'>Sign In</button>
        </form>
        <p class='alt-action'>No account?</p>
        <div class='field-row'>
          <a class='btn-secondary' style='text-align:center' href='{% url "register" %}?role=patient'>Register Patient</a>
          <a class='btn-secondary' style='text-align:center' href='{% url "register" %}?role=donor'>Register Donor</a>
        </div>
      </div>
    </div>
  </div>
</body>
{% endblock %}
